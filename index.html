<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vectra</title>

  <!--
    Babel Standalone — CDN primary, self-hosted fallback.
    Tries unpkg.com first (faster, always latest). If the CDN is unreachable
    (network block, COEP rejection, or offline), onerror swaps src to the
    version tracked in /public/babel.min.js which ships with every Vercel deploy.
  -->
  <script
    src="https://unpkg.com/@babel/standalone/babel.min.js"
    crossorigin="anonymous"
    onerror="this.onerror=null; this.src='/babel.min.js';"
  ></script>

  <!--
    Tailwind Play CDN — CDN primary, self-hosted fallback.
    Same pattern: cdn.tailwindcss.com first, /tailwind.js as fallback.
    crossorigin="anonymous" satisfies COEP: require-corp.
  -->
  <script
    src="https://cdn.tailwindcss.com"
    crossorigin="anonymous"
    onerror="this.onerror=null; this.src='/tailwind.js';"
  ></script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
