<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vectra</title>

  <!--
    Babel Standalone — CDN-first with local fallback.
    CDN: unpkg serves Babel with CORP: cross-origin header, so COEP: require-corp allows it.
    Fallback: /babel.min.js (self-hosted in /public) used if CDN times out or is blocked.
    window.Babel is the guard — if it's already set the inline fallback script is a no-op.
  -->
  <script
    src="https://unpkg.com/@babel/standalone/babel.min.js"
    crossorigin="anonymous"
    onerror="this.onerror=null;this.src='/babel.min.js'"
  ></script>
  <!-- Safety net: if the onerror src-swap also failed (e.g. network fully offline),
       synchronously load the local copy via document.write so the app never starts
       without Babel. This runs only when window.Babel is still undefined. -->
  <script>
    if (!window.Babel) {
      document.write('<script src="/babel.min.js"><\/script>');
    }
  </script>

  <!--
    Tailwind CSS — CDN-first with local fallback.
    CDN: Using <link rel="stylesheet"> as requested.
    Fallback: If CDN is blocked/fails, we fallback to the local /tailwind.js.
    NOTE: cdn.tailwindcss.com is a JS Play CDN; if linked as a stylesheet,
    browsers may show a MIME type warning.
  -->
  <link
    id="tailwind-cdn"
    href="https://cdn.tailwindcss.com/"
    rel="stylesheet"
    crossorigin="anonymous"
    onerror="this.onerror=null; this.href='/tailwind.js'; loadTailwindFallback();"
  />
  <script>
    function loadTailwindFallback() {
      if (!window.tailwind) {
        const s = document.createElement('script');
        s.src = '/tailwind.js';
        document.head.appendChild(s);
      }
    }
    // Safety check: ensure tailwind is loaded even if the link tag didn't fire onerror
    setTimeout(() => {
      if (!window.tailwind && !document.querySelector('script[src="/tailwind.js"]')) {
        loadTailwindFallback();
      }
    }, 1500);
  </script>

</head>


<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
